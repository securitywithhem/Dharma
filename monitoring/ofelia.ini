# ============================================================
# monitoring/ofelia.ini
# Ofelia job scheduler – cron schedules for backup tasks.
# Ofelia reads job configs from container labels (preferred)
# or this file (fallback for standalone use).
#
# Docs: https://github.com/mcuadros/ofelia
# ============================================================

[global]
save-folder = /var/log/ofelia

# ── Nightly PostgreSQL backup (02:00 UTC) ─────────────────────────────────
[job-exec "backup-postgres"]
schedule     = 0 2 * * *
container    = dharma-postgres
command      = /bin/bash -c "BACKUP_DIR=/backups/pg POSTGRES_HOST=localhost POSTGRES_USER=dharma POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dharmapass} POSTGRES_DB=dharma_db /scripts/backup-pg.sh"
no-overlap   = true

# ── Nightly MinIO backup (02:30 UTC) ─────────────────────────────────────
[job-exec "backup-minio"]
schedule     = 30 2 * * *
container    = dharma-minio-init
command      = /bin/sh -c "/scripts/backup-minio.sh"
no-overlap   = true

# ── Health check ping every 5 minutes ────────────────────────────────────
[job-exec "health-check"]
schedule     = */5 * * * *
container    = dharma-nextjs
command      = /bin/sh -c "wget -qO- http://localhost:3000/api/status > /dev/null && echo '[health] OK' || echo '[health] DEGRADED'"
no-overlap   = true
