name: Dharma E2E Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      # We will start database and other services inside Docker Compose in the step below,
      # since standard GHA services cannot easily link to our compose configuration.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Env File for Docker
        run: |
          cp .env.example .env
          # Replace secrets with CI defaults
          sed -i 's/NEXTAUTH_SECRET=.*/NEXTAUTH_SECRET=replace-with-a-random-32-character-secret-in-ci/' .env
          sed -i 's/DATABASE_URL=.*/DATABASE_URL=postgresql:\/\/dharma:password@localhost:5432\/dharma_db?schema=public/' .env

      - name: Start Docker Compose Stack
        run: |
          docker compose up -d postgres redis minio ollama nextjs worker
          docker compose ps

      - name: Wait for Next.js Application to be Ready
        run: |
          echo "Waiting for Next.js server to start on port 3000..."
          timeout 120s bash -c '
            until curl -sf http://localhost:3000/api/health >/dev/null; do
              echo "Waiting..."
              sleep 5
            done
          '
          echo "Next.js application is up and running!"

      - name: Install Playwright Browsers & OS Dependencies
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          # Point Playwright directly to the running host port
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: Upload Playwright Test Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
